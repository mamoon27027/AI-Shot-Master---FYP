name: ea_master_demo
description: EA Sport Master — mobile shot coaching demo (MoveNet + benchmark scoring).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.1
  permission_handler: ^11.4.0
  google_mlkit_pose_detection: ^0.13.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  get: ^4.7.3
  video_player: ^2.9.2
  fl_chart: ^0.66.0
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/cricket_benchmarks.json
    - assets/videos/
    - assets/avatars/
